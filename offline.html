<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Çevrimdışı · Tarih Ajanı</title>
<meta name="theme-color" content="#06070d">
<style>
  html,body{margin:0;height:100%;background:#06070d;color:#e9dfc8;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  .wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px 22px;gap:14px}
  img{width:88px;height:88px;border-radius:20px;box-shadow:0 12px 40px rgba(0,0,0,.6)}
  h1{margin:8px 0 0;font-size:22px;font-weight:800;letter-spacing:-.01em}
  p{margin:0;max-width:34ch;color:#a4a9b5;line-height:1.6;font-size:15px}
  .eyebrow{color:#c19a52;font-size:11px;letter-spacing:.24em;text-transform:uppercase}
  button{margin-top:10px;cursor:pointer;border:0;background:linear-gradient(110deg,#a77d35,#d8b26a 50%,#c19a52);color:#171207;font-weight:800;font-size:14px;letter-spacing:.06em;padding:15px 30px;border-radius:10px}
</style>
</head>
<body>
  <div class="wrap">
    <img src="/assets/pwa-icon-192.png" alt="Tarih Ajanı">
    <p class="eyebrow">Bağlantı Kesildi</p>
    <h1>Şu an çevrimdışısın</h1>
    <p>Dosyalar arşivde seni bekliyor. İnternet bağlantın gelince kaldığın yerden devam edebilirsin.</p>
    <button onclick="location.reload()">Yeniden Dene</button>
  </div>
</body>
</html>
