<style>
  html, body { margin: 0; height: 100%; background: #03050b; color: #e9dfc8; }
  body { display: grid; place-items: center; font-family: 'Special Elite', monospace; text-align: center; padding: 24px; box-sizing: border-box; }
  .stamp { display: inline-block; border: 2px solid rgba(200,80,80,.75); color: #e08585; padding: 8px 18px; font-size: 12px; letter-spacing: .3em; transform: rotate(-6deg); margin-bottom: 28px; }
  h1 { margin: 0; font-family: 'Playfair Display', serif; font-size: clamp(60px, 12vw, 120px); font-weight: 800; line-height: 1; background: linear-gradient(105deg, #a77d35, #e6c478 50%, #c19a52); -webkit-background-clip: text; background-clip: text; color: transparent; }
  p.msg { margin: 18px auto 0; max-width: 44ch; color: #a4a9b5; font-size: 14px; line-height: 1.8; letter-spacing: .04em; }
  .links { margin-top: 34px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .links a { text-decoration: none; font-size: 12px; letter-spacing: .14em; padding: 14px 22px; }
  .primary { background: linear-gradient(110deg, #a77d35, #d8b26a 50%, #c19a52); color: #171207; font-weight: 800; }
  .secondary { border: 1px solid rgba(193,154,82,.55); color: #e6c478; background: rgba(3,5,11,.5); }
  .code { margin-top: 40px; color: #4a4f5c; font-size: 10px; letter-spacing: .28em; }
</style>
</head>
<body>
<main>
  <div class="stamp">KAYIT BULUNAMADI</div>
  <h1>404</h1>
  <p class="msg">Aradığın dosya arşivde yok, ajan. Ya hiç var olmadı ya da kayıtlardan düşürüldü. İzini ana arşivden sürebilirsin.</p>
  <div class="links">
    <a class="primary" href="/">ANA ARŞİVE DÖN</a>
    <a class="secondary" href="/zaman-tuneli">ZAMAN TÜNELİ</a>
    <a class="secondary" href="/urunler">ÜRÜNLER</a>
  </div>
  <p class="code">DOSYA NO · 404 · ERİŞİM REDDEDİLDİ</p>
</main>
</body>
